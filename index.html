<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 知識萃取與測驗系統 | Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* ==========================================
           🎨 大師級調色盤 & 變數 (參考 Tailwind UI / Vercel 風格)
           ========================================== */
        :root { 
            --hue: 220;
            --primary: hsl(var(--hue), 85%, 55%);
            --primary-hover: hsl(var(--hue), 85%, 45%);
            --primary-ring: hsla(var(--hue), 85%, 55%, 0.3);
            
            --bg: #f8fafc; 
            --card-bg: #ffffff; 
            --text-main: #0f172a; 
            --text-muted: #64748b;
            --border: #e2e8f0; 
            --input-bg: #f1f5f9; 
            
            --option-bg: #ffffff;
            --option-hover: #f8fafc;
            --timer-bg: #fffbeb; 
            --timer-border: #fef3c7;
            --timer-text: #b45309;
            
            --success-bg: #f0fdf4; --success-border: #bbf7d0; --success-text: #15803d;
            --danger-bg: #fef2f2; --danger-border: #fecaca; --danger-text: #b91c1c;
            
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.05), 0 2px 4px -2px rgb(0 0 0 / 0.05);
            --shadow-hover: 0 20px 25px -5px rgb(0 0 0 / 0.05), 0 8px 10px -6px rgb(0 0 0 / 0.05);
        }

        /* 🌙 暗黑模式高階調色盤 */
        [data-theme="dark"] {
            --bg: #0f172a; 
            --card-bg: #1e293b; 
            --text-main: #f8fafc; 
            --text-muted: #94a3b8;
            --border: #334155; 
            --input-bg: #0f172a; 
            
            --option-bg: #1e293b;
            --option-hover: #334155;
            --timer-bg: #422006; 
            --timer-border: #713f12;
            --timer-text: #fde68a;
            
            --success-bg: #14532d; --success-border: #166534; --success-text: #86efac;
            --danger-bg: #7f1d1d; --danger-border: #991b1b; --danger-text: #fca5a5;
            
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.3);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.2), 0 2px 4px -2px rgb(0 0 0 / 0.2);
            --shadow-hover: 0 20px 25px -5px rgb(0 0 0 / 0.3), 0 8px 10px -6px rgb(0 0 0 / 0.3);
        }

        /* ==========================================
           ✨ 全局與排版設定
           ========================================== */
        * { box-sizing: border-box; }
        body { 
            font-family: 'Inter', 'Noto Sans TC', sans-serif; 
            max-width: 900px; 
            margin: 0 auto; 
            padding: 20px 20px 80px 20px; 
            background-color: var(--bg); 
            color: var(--text-main); 
            line-height: 1.7; 
            transition: background-color 0.4s ease, color 0.4s ease; 
        }
        h1 { text-align: center; color: var(--text-main); font-size: 2.5rem; margin-bottom: 8px; font-weight: 700; letter-spacing: -0.02em; }
        .subtitle { text-align: center; color: var(--text-muted); font-size: 1.1rem; margin-bottom: 40px; font-weight: 400; }
        h2 { font-size: 1.5rem; font-weight: 600; margin: 0 0 16px 0; color: var(--text-main); letter-spacing: -0.01em; }
        
        /* ==========================================
           🧱 核心元件 (Cards, Buttons, Inputs)
           ========================================== */
        .card-panel { 
            background: var(--card-bg); 
            padding: 32px; 
            border-radius: 16px; 
            border: 1px solid var(--border);
            box-shadow: var(--shadow-md); 
            margin-bottom: 24px; 
            transition: transform 0.3s ease, box-shadow 0.3s ease, background-color 0.4s ease, border-color 0.4s ease; 
        }
        
        button { font-family: inherit; }
        .btn { 
            display: inline-flex; justify-content: center; align-items: center; gap: 8px;
            width: 100%; padding: 14px 24px; border-radius: 12px; font-size: 1rem; font-weight: 600; 
            cursor: pointer; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); border: none; outline: none;
        }
        .btn-primary { background-color: var(--primary); color: white; box-shadow: 0 4px 14px 0 var(--primary-ring); }
        .btn-primary:hover { background-color: var(--primary-hover); transform: translateY(-1px); box-shadow: 0 6px 20px 0 var(--primary-ring); }
        .btn-outline { background-color: transparent; border: 1px solid var(--border); color: var(--text-main); }
        .btn-outline:hover { background-color: var(--input-bg); }
        .btn-danger { background-color: transparent; color: var(--danger-text); border: 1px solid var(--danger-border); }
        .btn-danger:hover { background-color: var(--danger-bg); }
        .btn-small { width: auto; padding: 8px 16px; font-size: 0.9rem; border-radius: 8px; }

        input, select, textarea { 
            width: 100%; padding: 14px 16px; margin-bottom: 16px; 
            border: 1px solid var(--border); border-radius: 12px; 
            font-size: 1rem; font-family: inherit;
            background-color: var(--input-bg); color: var(--text-main); 
            transition: all 0.2s ease; outline: none; 
        }
        textarea { height: 180px; resize: vertical; line-height: 1.6; }
        input:focus, textarea:focus, select:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-ring); background-color: var(--card-bg); }
        input::placeholder, textarea::placeholder { color: var(--text-muted); opacity: 0.7; }
        
        .hidden { display: none !important; }

        /* ==========================================
           🧩 特定區塊樣式
           ========================================== */
        /* 帳號導覽列 (毛玻璃效果) */
        .account-bar { 
            position: sticky; top: 16px; z-index: 50;
            display: flex; justify-content: space-between; align-items: center; 
            margin-bottom: 32px; padding: 12px 24px; 
            background: rgba(var(--card-bg), 0.8); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border); border-radius: 100px; 
            box-shadow: var(--shadow-md); 
        }
        .account-bar .actions { display: flex; gap: 8px; }

        /* 控制選單 Grid */
        .controls-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 12px; margin-bottom: 20px; }
        .controls-grid select { margin-bottom: 0; cursor: pointer; }

        /* 載入動畫 (優雅版) */
        #loading { text-align: center; padding: 40px 0; display: none; }
        .loader { border: 3px solid var(--border); border-top: 3px solid var(--primary); border-radius: 50%; width: 32px; height: 32px; animation: spin 1s linear infinite; margin: 0 auto 16px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .loading-text { color: var(--text-muted); font-size: 0.95rem; font-weight: 500; }

        /* 筆記與 Markdown 顯示 */
        .organized-content { 
            background-color: var(--input-bg); padding: 32px; border-radius: 12px; 
            font-size: 1.05rem; color: var(--text-main); 
            border: 1px solid var(--border); margin-top: 16px;
        }
        .organized-content h1, .organized-content h2, .organized-content h3 { color: var(--text-main); margin-top: 1.5em; text-align: left; }
        .organized-content p { margin-bottom: 1.2em; }
        .organized-content a { color: var(--primary); text-decoration: none; font-weight: 500; }
        .organized-content a:hover { text-decoration: underline; }
        
        /* 測驗區塊 */
        .timer-setup { background: var(--timer-bg); border-color: var(--timer-border); text-align: center; }
        .timer-setup input[type="number"] { width: 80px; display: inline-block; margin: 0 8px; text-align: center; background: var(--card-bg); }
        
        #stickyTimer { 
            position: sticky; top: 80px; z-index: 40;
            background: var(--timer-bg); color: var(--timer-text); 
            padding: 12px 24px; text-align: center; font-weight: 700; font-size: 1.2rem; font-variant-numeric: tabular-nums;
            border-radius: 100px; border: 1px solid var(--timer-border); 
            box-shadow: var(--shadow-md); margin-bottom: 24px; display: none; transition: all 0.3s ease; 
        }
        #stickyTimer.danger { background: var(--danger-bg); color: var(--danger-text); border-color: var(--danger-border); animation: pulse-danger 1s infinite; }
        @keyframes pulse-danger { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.02); } }

        .question-card { border: 1px solid var(--border); padding: 32px; }
        .question-text { font-weight: 600; font-size: 1.2rem; margin-bottom: 24px; line-height: 1.5; color: var(--text-main); }
        
        .option { 
            display: flex; align-items: center; padding: 16px 20px; margin-bottom: 12px; 
            background-color: var(--option-bg); border: 1px solid var(--border); border-radius: 12px; 
            cursor: pointer; font-size: 1.05rem; transition: all 0.2s ease; 
        }
        .option:hover { background-color: var(--option-hover); border-color: var(--primary); }
        .option.correct { background-color: var(--success-bg); border-color: var(--success-border); color: var(--success-text); font-weight: 600; }
        .option.wrong { background-color: var(--danger-bg); border-color: var(--danger-border); color: var(--danger-text); }
        .question-card.disabled .option { pointer-events: none; opacity: 0.8; }
        
        /* 清單項目 (歷史、錯題) */
        .list-item { 
            padding: 20px; background: var(--input-bg); border: 1px solid var(--border); 
            border-radius: 12px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; 
            transition: all 0.2s ease; 
        }
        .list-item:hover { transform: translateY(-2px); box-shadow: var(--shadow-sm); border-color: var(--primary); }
        .item-meta { color: var(--text-muted); font-size: 0.85rem; margin-top: 6px; display: flex; gap: 12px; }
        
        .mistake-card .correct-ans { background: var(--success-bg); color: var(--success-text); padding: 12px 16px; border-radius: 8px; margin-top: 16px; font-weight: 500; font-size: 0.95rem; border: 1px solid var(--success-border); }

        /* 🏆 成就彈窗 (現代化) */
        .achievement-modal { 
            position: fixed; bottom: 32px; right: -400px; 
            background: var(--card-bg); border: 1px solid var(--border); 
            padding: 20px 24px; border-radius: 16px; box-shadow: var(--shadow-hover); 
            z-index: 1000; transition: right 0.6s cubic-bezier(0.16, 1, 0.3, 1); 
            display: flex; align-items: center; gap: 16px; width: 340px; 
        }
        .achievement-modal.show { right: 32px; }
        .achievement-icon { font-size: 2.5rem; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1)); }
        .achievement-text h4 { margin: 0 0 4px 0; color: var(--text-main); font-size: 1.1rem; font-weight: 700; }
        .achievement-text p { margin: 0; font-size: 0.9rem; color: var(--text-muted); line-height: 1.4; }

        /* 🌓 懸浮暗黑模式切換按鈕 */
        .theme-toggle-btn { 
            position: fixed; bottom: 32px; right: 32px; 
            background: var(--card-bg); color: var(--text-main); border: 1px solid var(--border); 
            border-radius: 50%; width: 48px; height: 48px; font-size: 20px; 
            cursor: pointer; box-shadow: var(--shadow-md); z-index: 999; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); display: flex; align-items: center; justify-content: center; 
        }
        .theme-toggle-btn:hover { transform: scale(1.1) rotate(15deg); box-shadow: var(--shadow-hover); border-color: var(--primary); }
    </style>
</head>
<body>

    <button class="theme-toggle-btn" id="themeToggleBtn" onclick="window.toggleTheme()">☀️</button>

    <div id="achievementPopup" class="achievement-modal">
        <div class="achievement-icon" id="achIcon">🏆</div>
        <div class="achievement-text">
            <h4 id="achTitle">成就解鎖</h4>
            <p id="achDesc">說明文字</p>
        </div>
    </div>

    <h1>AI Pro Quiz</h1>
    <div class="subtitle">智能知識萃取與專業測驗平台</div>

    <div id="authSection" class="card-panel">
        <h2 style="text-align: center; margin-bottom: 32px;">歡迎回來</h2>
        <button class="btn btn-outline" onclick="window.loginWithGoogle()" style="margin-bottom: 24px;">
            <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.7 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
            使用 Google 繼續
        </button>
        <div style="display: flex; align-items: center; margin: 24px 0;">
            <div style="flex-grow: 1; height: 1px; background: var(--border);"></div>
            <span style="padding: 0 16px; color: var(--text-muted); font-size: 0.9rem;">或使用電子郵件</span>
            <div style="flex-grow: 1; height: 1px; background: var(--border);"></div>
        </div>
        <input type="email" id="emailInput" placeholder="name@example.com">
        <input type="password" id="passwordInput" placeholder="密碼 (至少 6 碼)">
        <button class="btn btn-primary" onclick="window.loginWithEmail()">登入帳號</button>
        <button class="btn btn-outline" onclick="window.registerWithEmail()" style="margin-top: 8px;">建立新帳號</button>
        <p id="authErrorMsg" style="color: var(--danger-text); text-align: center; margin-top: 16px; font-size: 0.9rem; font-weight: 500;"></p>
    </div>

    <div id="appSection" class="hidden">
        
        <div class="account-bar">
            <span style="font-weight: 500; font-size: 0.95rem;">👋 <span id="userEmailDisplay"></span></span>
            <div class="actions">
                <button class="btn btn-small btn-outline" onclick="window.fetchHistory()">歷史庫</button>
                <button class="btn btn-small btn-danger" onclick="window.fetchMistakes()">錯題本</button>
                <button class="btn btn-small btn-outline" onclick="window.logout()" style="border: none;">登出</button>
            </div>
        </div>

        <div id="dashboardSection" class="card-panel hidden">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
                <h2 id="dashboardTitle" style="margin: 0;">檔案庫</h2>
                <button class="btn btn-small btn-outline" onclick="window.closeDashboard()">返回</button>
            </div>
            <div id="dashboardList"></div>
        </div>

        <div class="card-panel" id="inputSection">
            <h2>建立新測驗</h2>
            <div class="controls-grid">
                <select id="qType"><option value="單選題">單選題</option><option value="是非題">是非題</option></select>
                <select id="qCount"><option value="3">3 題</option><option value="5" selected>5 題</option><option value="10">10 題</option></select>
                <select id="diff"><option value="簡單">簡單</option><option value="適中" selected>適中</option><option value="困難">困難</option></select>
            </div>
            <textarea id="noteInput" placeholder="貼上您的學習筆記或文章內容，AI 將為您進行深度解析與出題..."></textarea>
            <button class="btn btn-primary" onclick="window.generateContent()">生成專業教材</button>
        </div>

        <div id="loading">
            <div class="loader"></div>
            <div class="loading-text">AI 模型解析中，請稍候...</div>
        </div>

        <div id="prepSection" class="hidden">
            <div class="card-panel">
                <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); padding-bottom: 16px; margin-bottom: 16px;">
                    <h2 style="margin: 0;">知識點整理</h2>
                    <button class="btn btn-small btn-outline" onclick="window.copyNote()">複製內容</button>
                </div>
                <div id="organizedContent" class="organized-content"></div>
                <textarea id="rawMarkdown" style="display:none;"></textarea>
            </div>

            <div class="card-panel timer-setup">
                <h2>測驗設定</h2>
                <p style="color:var(--text-muted); margin-bottom:24px;">請詳閱上方教材，準備就緒後啟動測驗。</p>
                <div style="display: flex; align-items: center; justify-content: center; gap: 16px; margin-bottom: 24px;">
                    <label style="display: flex; align-items: center; gap: 8px; cursor: pointer; font-weight: 500;">
                        <input type="checkbox" id="enableTimer" checked onchange="window.toggleTimerInput()" style="width:18px; height:18px; margin:0;"> 啟用計時
                    </label>
                    <div id="timeInputDiv" style="display: flex; align-items: center; font-weight: 500;">
                        時長 <input type="number" id="timeMinutes" min="1"> 分鐘
                    </div>
                </div>
                <button class="btn btn-primary" style="background-color: #10b981; box-shadow: 0 4px 14px 0 rgba(16, 185, 129, 0.3);" onclick="window.startTest()">啟動測驗</button>
            </div>
        </div>

        <div id="testSection" class="hidden">
            <div id="stickyTimer">剩餘時間 <span id="timeDisplay" style="margin-left: 8px;">00:00</span></div>
            <div id="questionsContainer"></div>
            
            <div id="scoreBoard" class="hidden card-panel" style="text-align: center; border: 2px solid var(--primary); background: var(--input-bg);">
                <h2 id="scoreTitle" style="font-size: 2rem; margin-bottom: 8px;"></h2>
                <p id="scoreText" style="font-size: 1.25rem; font-weight: 600; margin-bottom: 8px;"></p>
                <p id="savingText" style="color: var(--text-muted); font-size: 0.95rem; margin-bottom: 32px;">數據同步中...</p>
                <button class="btn btn-primary" style="max-width: 200px; margin: 0 auto;" onclick="location.reload()">建立新測驗</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB5pz4KXXzuvE5E_m69iS_pdXZK7xpR0Y4",
            authDomain: "ai-quiz-app-f2a9e.firebaseapp.com",
            projectId: "ai-quiz-app-f2a9e",
            storageBucket: "ai-quiz-app-f2a9e.firebasestorage.app",
            messagingSenderId: "374199534382",
            appId: "1:374199534382:web:d9c070e4bc41ddc44ff0bf"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();
        let currentUserEmail = ""; 

        const initTheme = () => {
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.body.setAttribute('data-theme', savedTheme);
            document.getElementById('themeToggleBtn').innerText = savedTheme === 'dark' ? '☀️' : '🌙';
        };
        initTheme();

        window.toggleTheme = () => {
            const body = document.body;
            const newTheme = body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            body.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            document.getElementById('themeToggleBtn').innerText = newTheme === 'dark' ? '☀️' : '🌙';
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUserEmail = user.email;
                document.getElementById('userEmailDisplay').innerText = currentUserEmail;
                document.getElementById('authSection').classList.add('hidden');
                document.getElementById('appSection').classList.remove('hidden');
            } else {
                currentUserEmail = "";
                document.getElementById('authSection').classList.remove('hidden');
                document.getElementById('appSection').classList.add('hidden');
            }
        });

        window.loginWithGoogle = () => signInWithPopup(auth, provider).catch(err => showError(err.message));
        window.registerWithEmail = () => createUserWithEmailAndPassword(auth, document.getElementById('emailInput').value, document.getElementById('passwordInput').value).then(() => alert("註冊成功！系統將自動登入。")).catch(err => showError(err.message));
        window.loginWithEmail = () => signInWithEmailAndPassword(auth, document.getElementById('emailInput').value, document.getElementById('passwordInput').value).catch(err => showError("登入失敗，請檢查帳號密碼。"));
        window.logout = () => signOut(auth).then(() => { location.reload(); });
        function showError(msg) { document.getElementById('authErrorMsg').innerText = msg; }

        const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxokgVbuoTiV6kSmoFcPF2xebBi84D-ozEK88m2WagPHiZKT0wNT85p7UduDPu_cNHI/exec";
        
        let testData = null; let totalQuestions = 0; let answeredQuestions = 0; let correctAnswers = 0;
        let timerInterval; let timeRemaining = 0; let currentMistakes = [];

        window.generateContent = async () => {
            const note = document.getElementById('noteInput').value;
            if (!note.trim()) return alert('請先輸入內容');
            showLoading();
            try {
                const response = await fetch(GAS_WEB_APP_URL, {
                    method: 'POST', body: JSON.stringify({ action: 'generate', username: currentUserEmail, note, qType: document.getElementById('qType').value, qCount: document.getElementById('qCount').value, diff: document.getElementById('diff').value })
                });
                const result = await response.json();
                if (result.status === 'error') throw new Error(result.message);
                loadPrepSection(result);
            } catch (error) { alert('錯誤：' + error.message); document.getElementById('inputSection').classList.remove('hidden'); }
            finally { document.getElementById('loading').style.display = 'none'; }
        };

        window.fetchHistory = async () => {
            showLoading(); document.getElementById('dashboardTitle').innerText = "歷史檔案庫";
            try {
                const response = await fetch(GAS_WEB_APP_URL, { method: 'POST', body: JSON.stringify({ action: 'getHistory', username: currentUserEmail }) });
                const result = await response.json();
                if (result.status === 'error') throw new Error(result.message);
                const listDiv = document.getElementById('dashboardList');
                listDiv.innerHTML = result.history.length === 0 ? '<p style="text-align:center; color:var(--text-muted);">尚無歷史紀錄</p>' : '';
                
                result.history.forEach((item) => {
                    const d = new Date(item.timestamp);
                    const div = document.createElement('div'); div.className = 'list-item';
                    div.innerHTML = `<div><strong style="font-size:1.1rem;">${item.noteSnippet}</strong><div class="item-meta"><span>${d.getMonth()+1}/${d.getDate()}</span><span>${item.diff} • ${item.qCount}題</span></div></div>
                        <button class="btn btn-small btn-primary retest-btn" style="margin:0; box-shadow:none;">重新測驗</button>`;
                    listDiv.appendChild(div);
                    
                    // 💡 修正點：改用 querySelector 綁定事件，避免 ID 衝突
                    div.querySelector('.retest-btn').onclick = () => { 
                        document.getElementById('dashboardSection').classList.add('hidden'); 
                        loadPrepSection(item); 
                    };
                });
                document.getElementById('dashboardSection').classList.remove('hidden');
            } catch (error) { alert('查詢失敗：' + error.message); document.getElementById('inputSection').classList.remove('hidden'); }
            finally { document.getElementById('loading').style.display = 'none'; }
        };

        window.fetchMistakes = async () => {
            showLoading(); document.getElementById('dashboardTitle').innerText = "錯題分析";
            try {
                const response = await fetch(GAS_WEB_APP_URL, { method: 'POST', body: JSON.stringify({ action: 'getMistakes', username: currentUserEmail }) });
                const result = await response.json();
                if (result.status === 'error') throw new Error(result.message);
                const listDiv = document.getElementById('dashboardList');
                listDiv.innerHTML = result.mistakes.length === 0 ? '<p style="text-align:center; color:var(--text-muted);">目前沒有錯題紀錄，繼續保持！</p>' : '';
                result.mistakes.forEach(item => {
                    const div = document.createElement('div'); div.className = 'mistake-card';
                    div.innerHTML = `<div style="font-weight:600; font-size:1.1rem; margin-bottom:12px; color:var(--text-main);">Q. ${item.question}</div>
                                     <div class="correct-ans">正確答案：${item.options[item.answer_index]}</div>`;
                    listDiv.appendChild(div);
                });
                document.getElementById('dashboardSection').classList.remove('hidden');
            } catch (error) { alert('查詢失敗：' + error.message); document.getElementById('inputSection').classList.remove('hidden'); }
            finally { document.getElementById('loading').style.display = 'none'; }
        };

        window.closeDashboard = () => { document.getElementById('dashboardSection').classList.add('hidden'); document.getElementById('inputSection').classList.remove('hidden'); };

        // 💡 修正點：強制把 scoreBoard 也隱藏，確保狀態乾淨
        function showLoading() {
            document.getElementById('inputSection').classList.add('hidden'); 
            document.getElementById('dashboardSection').classList.add('hidden'); 
            document.getElementById('prepSection').classList.add('hidden'); 
            document.getElementById('testSection').classList.add('hidden');
            document.getElementById('scoreBoard').classList.add('hidden'); 
            document.getElementById('loading').style.display = 'block';
        }

        function loadPrepSection(data) {
            testData = data; currentMistakes = []; 
            document.getElementById('organizedContent').innerHTML = marked.parse(data.organized_notes || '無筆記資料');
            document.getElementById('rawMarkdown').value = data.organized_notes || '';
            document.getElementById('timeMinutes').value = data.suggested_time || 5;
            document.getElementById('prepSection').classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        window.toggleTimerInput = () => document.getElementById('timeInputDiv').style.display = document.getElementById('enableTimer').checked ? 'flex' : 'none';
        window.copyNote = () => { const r = document.getElementById('rawMarkdown'); r.style.display='block'; r.select(); document.execCommand('copy'); r.style.display='none'; alert('✅ 內容已複製'); };

        window.startTest = () => {
            document.getElementById('prepSection').classList.add('hidden'); 
            document.getElementById('testSection').classList.remove('hidden');
            document.getElementById('scoreBoard').classList.add('hidden'); // 💡 修正點：確保開始測驗時，看板一定是收起來的
            
            const qContainer = document.getElementById('questionsContainer'); qContainer.innerHTML = '';
            totalQuestions = testData.questions.length; answeredQuestions = 0; correctAnswers = 0;

            testData.questions.forEach((q, index) => {
                const card = document.createElement('div'); card.className = 'question-card card-panel'; card.dataset.ans = q.answer_index; card.dataset.qIdx = index;
                let html = `<div class="question-text">${index + 1}. ${q.question}</div>`;
                q.options.forEach((opt, optIndex) => { html += `<div class="option" data-opt="${optIndex}">${opt}</div>`; });
                card.innerHTML = html; qContainer.appendChild(card);
                card.querySelectorAll('.option').forEach(optEl => { optEl.onclick = () => window.checkAnswer(optEl, parseInt(optEl.dataset.opt), parseInt(card.dataset.ans), card); });
            });

            const stickyTimer = document.getElementById('stickyTimer');
            if (document.getElementById('enableTimer').checked) {
                timeRemaining = parseInt(document.getElementById('timeMinutes').value) * 60;
                stickyTimer.style.display = 'block'; stickyTimer.classList.remove('danger'); updateTimerDisplay();
                timerInterval = setInterval(() => {
                    timeRemaining--; updateTimerDisplay();
                    if (timeRemaining <= 10) stickyTimer.classList.add('danger');
                    if (timeRemaining <= 0) { clearInterval(timerInterval); forceSubmit(); }
                }, 1000);
            } else stickyTimer.style.display = 'none';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        function updateTimerDisplay() { document.getElementById('timeDisplay').innerText = `${Math.floor(timeRemaining/60).toString().padStart(2,'0')}:${(timeRemaining%60).toString().padStart(2,'0')}`; }

        window.checkAnswer = (selectedEl, selectedIdx, correctIdx, cardEl) => {
            if (cardEl.dataset.answered === "true") return;
            cardEl.dataset.answered = "true";
            cardEl.querySelectorAll('.option').forEach(o => o.style.pointerEvents = 'none');
            answeredQuestions++;

            if (selectedIdx === correctIdx) {
                selectedEl.classList.add('correct'); correctAnswers++;
            } else {
                selectedEl.classList.add('wrong'); cardEl.querySelectorAll('.option')[correctIdx].classList.add('correct');
                currentMistakes.push(testData.questions[parseInt(cardEl.dataset.qIdx)]);
            }
            if (answeredQuestions === totalQuestions) { clearInterval(timerInterval); submitScoreAndShowResult(); }
        };

        function forceSubmit() {
            alert("時間結束，系統已自動交卷。");
            document.querySelectorAll('.question-card').forEach(card => {
                if (card.dataset.answered !== "true") {
                    card.dataset.answered = "true"; card.classList.add('disabled');
                    const correctIdx = parseInt(card.dataset.ans);
                    card.querySelectorAll('.option').forEach(o => o.style.pointerEvents = 'none');
                    card.querySelectorAll('.option')[correctIdx].classList.add('correct');
                    currentMistakes.push(testData.questions[parseInt(card.dataset.qIdx)]);
                }
            });
            submitScoreAndShowResult();
        }

        async function submitScoreAndShowResult() {
            document.getElementById('stickyTimer').style.display = 'none';
            document.getElementById('scoreBoard').classList.remove('hidden');
            
            let percentage = (correctAnswers / totalQuestions) * 100;
            document.getElementById('scoreTitle').innerText = percentage === 100 ? "完美掌握！" : percentage >= 80 ? "表現優異" : percentage >= 60 ? "測驗合格" : "需要加強";
            document.getElementById('scoreText').innerText = `得分：${correctAnswers} / ${totalQuestions}`;
            document.getElementById('savingText').innerText = "📡 正在將成績與錯題同步至雲端...";
            
            try {
                const response = await fetch(GAS_WEB_APP_URL, {
                    method: 'POST', body: JSON.stringify({ action: 'submitScore', username: currentUserEmail, mistakes: currentMistakes, isPerfect: (percentage === 100) })
                });
                const result = await response.json();
                document.getElementById('savingText').innerText = "✅ 數據已安全同步至雲端";
                if (result.achievements && result.achievements.length > 0) {
                    result.achievements.forEach((ach, i) => { setTimeout(() => showAchievement(ach.icon, ach.title, ach.desc), i * 3500); });
                }
            } catch (error) { document.getElementById('savingText').innerText = "⚠️ 數據同步異常"; }
            setTimeout(() => document.getElementById('scoreBoard').scrollIntoView({ behavior: 'smooth', block: 'end' }), 300);
        }

        function showAchievement(icon, title, desc) {
            document.getElementById('achIcon').innerText = icon;
            document.getElementById('achTitle').innerText = title;
            document.getElementById('achDesc').innerText = desc;
            const popup = document.getElementById('achievementPopup');
            popup.classList.add('show');
            setTimeout(() => { popup.classList.remove('show'); }, 3000);
        }
    </script>
</body>
</html>
